# Paid-model pricing + budget config for the cost guard (Phase 0.4).
#
# Prices are provider LIST prices in USD per 1,000,000 tokens. They are APPROXIMATE
# (knowledge cutoff Jan 2026) and MUST be re-verified before any paid run — the smoke
# test logs ACTUAL usage, so reconcile real cost against these. Edit this file, not code.
#
# Budget is enforced in EUR (CLAUDE.md §4/§8 hard ceiling). USD prices are converted with
# eur_per_usd below.

# Two separate ceilings (CLAUDE.md §6.1/§11): the OpenAI closed anchor, and DeepInfra
# (the open-weight roster). Per-provider enforcement is wired at Phase 4.1.
budget_eur_ceiling: 150.0          # OpenAI anchor (GPT-5.1)
deepinfra_budget_eur_ceiling: 150.0 # DeepInfra (open roster); runaway-guard, not a usage squeeze
eur_per_usd: 0.92          # ~1 USD = 0.92 EUR (Jun 2026 approx; verify)

# Default token assumptions for a single grading call, used by the pre-flight estimator
# when a caller does not pass measured token counts. Tune from real runs.
default_call_tokens:
  input: 1500             # question stem + rubric/reference + student answer + template
  output: 600             # holistic score + short justification (reasoning OFF)
  output_reasoning: 4000  # reasoning ON balloons output ~5-10x (CLAUDE.md §6.2)

models:
  # --- Cheap API (near-free), OpenAI-compatible. China-hosted -> anonymised data ONLY ---
  deepseek-chat:                 # DeepSeek V3.x non-reasoning
    input_per_1m_usd: 0.28
    output_per_1m_usd: 0.42
    provider: deepseek
    api: openai_compatible
    base_url: https://api.deepseek.com
    env_key: DEEPSEEK_API_KEY
    reasoning: false
    note: China-hosted; anonymised data only (CLAUDE.md §6.1).
  deepseek-reasoner:             # DeepSeek R1-style reasoning
    input_per_1m_usd: 0.56
    output_per_1m_usd: 1.68
    provider: deepseek
    api: openai_compatible
    base_url: https://api.deepseek.com
    env_key: DEEPSEEK_API_KEY
    reasoning: true
    note: China-hosted; anonymised data only.

  # --- Paid frontier anchor: GPT-5.1 (CHOSEN, Phase 0.4, 2026-06-07) ---
  # Chosen over Gemini 3 Pro / Claude Sonnet on price + a genuinely BINARY reasoning
  # toggle, which RQ1's clean reasoning-off condition requires.
  gpt-5.1:
    input_per_1m_usd: 1.25
    output_per_1m_usd: 10.0
    provider: openai
    api: openai_compatible
    base_url: https://api.openai.com/v1
    env_key: OPENAI_API_KEY
    is_anchor: true
    # The D2 reasoning factor maps to reasoning_effort on this model. "none" is a TRUE
    # off (behaves as a non-reasoning model) — NOT the same as the old GPT-5 "minimal".
    # The config schema (Phase 3.1) must use exactly this mapping for a clean on/off.
    reasoning_param: reasoning_effort
    # NB: quote the keys — bare off/on are YAML 1.1 booleans (-> False/True).
    reasoning_values: { "off": "none", "on": "high" }   # also available: low, medium
    note: Verify GPT-5.1 tier + price before any paid run; off=none, on=high.

  # --- Anchor candidates NOT chosen (kept for pricing reference / DO NOT reselect blindly) ---
  gemini-3-pro:
    input_per_1m_usd: 1.25
    output_per_1m_usd: 10.0
    provider: google
    api: gemini
    base_url: https://generativelanguage.googleapis.com
    env_key: GEMINI_API_KEY
    is_anchor: false
    # REJECTED as anchor: cannot truly disable reasoning. thinking_level minimum is
    # "low" (still reasons); thinking_budget=0 only disables thinking on Gemini 2.5
    # Flash/Flash-Lite, not 3 Pro. No clean reasoning-off -> unfit for RQ1.
    note: Rejected anchor (no clean reasoning-off). Reference price only.
  claude-sonnet-4-6:             # extended thinking on/off
    input_per_1m_usd: 3.0
    output_per_1m_usd: 15.0
    provider: anthropic
    api: anthropic
    base_url: https://api.anthropic.com
    env_key: ANTHROPIC_API_KEY
    is_anchor: false
    note: Not chosen (~1.7x pricier). Reference price only; prompt-caching can cut input.

  # --- Open-weight roster via DeepInfra (CLAUDE.md §6.1 / experiments/model_roster.md) ---
  # OpenAI-compatible. Prices APPROX (verify on https://deepinfra.com/models) and exact model
  # IDs to confirm against the live list at Phase 3.4. Reasoning toggled via chat_template_kwargs
  # (enable_thinking) for Qwen/DeepSeek/GLM; the config schema maps D2 off/on accordingly.
  deepseek-v4-flash:               # 284B/13B MoE — RQ1 toggle + cheap cost-floor
    model_id: deepseek-ai/DeepSeek-V4-Flash
    input_per_1m_usd: 0.14
    output_per_1m_usd: 0.28
    provider: deepinfra
    api: openai_compatible
    base_url: https://api.deepinfra.com/v1/openai
    env_key: DEEPINFRA_API_KEY
    reasoning_param: enable_thinking
    reasoning_values: { "off": false, "on": true }
    note: VERIFY id/price; toggle via chat_template_kwargs.enable_thinking.
  qwen3.5:                         # RQ1 primary toggle (Apache-2.0); MoE 35B/3B-active (efficient, realistic)
    model_id: Qwen/Qwen3.5-35B-A3B     # confirmed on DeepInfra (alt: -397B-A17B flagship, -27B, -9B)
    input_per_1m_usd: 0.20
    output_per_1m_usd: 0.60
    provider: deepinfra
    api: openai_compatible
    base_url: https://api.deepinfra.com/v1/openai
    env_key: DEEPINFRA_API_KEY
    reasoning_param: enable_thinking
    reasoning_values: { "off": false, "on": true }
    note: VERIFY id/price/variant.
  glm-5.1:                         # RQ1 toggle + strongest open coder
    model_id: zai-org/GLM-5.1          # TODO confirm exact id
    input_per_1m_usd: 0.40
    output_per_1m_usd: 0.60
    provider: deepinfra
    api: openai_compatible
    base_url: https://api.deepinfra.com/v1/openai
    env_key: DEEPINFRA_API_KEY
    reasoning_param: enable_thinking
    reasoning_values: { "off": false, "on": true }
    # 3.4 CHECK: confirm GLM hybrid allows a CLEAN reasoning-OFF (genuinely disabled) since
    # GLM is in the RQ1 toggle arm; if not, substitute or treat the axis with an honest caveat.
    note: VERIFY id/price; confirm clean OFF (3.4).
